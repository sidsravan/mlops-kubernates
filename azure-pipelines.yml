trigger:
  branches:
    include:
      - main

variables:
  imageName: 'mlops-kubernetes'
  tag: '$(Build.BuildId)'
  acrName: 'aihackthonacr'
  aksCluster: 'aihackthon-aks'
  aksRG: 'aihackthon-rg'
  dockerfilePath: 'model/Dockerfile'
  imageFullName: '$(acrName).azurecr.io/$(imageName):$(tag)'

stages:

# ---------------------------------------------------------
# 2. BUILD → IMAGE SCAN → PUSH TO ACR
# ---------------------------------------------------------
- stage: Build_and_Push
  displayName: "Build, Scan & Push Docker Image"
  jobs:
    - job: Build
      displayName: "Build Docker Image"
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self

        # Login to ACR
        - task: AzureCLI@2
          inputs:
            azureSubscription: 'azureconn'
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az acr login --name $(acrName)

        # Build Docker Image
        - script: |
            docker build -t $(imageFullName) .
          displayName: "Build Docker Image"

        # Push Image to ACR
        - script: |
            docker push $(imageFullName)
          displayName: "Push Image to ACR"

# ---------------------------------------------------------
# 3. DEPLOY TO AKS
# ---------------------------------------------------------
- stage: Deploy
  displayName: "Deploy to AKS"
  dependsOn: Build_and_Push
  jobs:
    - job: DeployJob
      displayName: "Deploy to AKS"
      pool:
        vmImage: 'ubuntu-latest'
      steps:

        # Login to AKS
        - task: AzureCLI@2
          inputs:
            azureSubscription: 'azureconn'
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az aks get-credentials --resource-group $(aksRG) --name $(aksCluster)

        # Apply manifests (ensures deployment exists)
        - script: |
            kubectl apply -f 04-k8s-manifests/
          displayName: "Apply Kubernetes Manifests"

        # Update image in correct deployment + namespace
        - script: |
            kubectl set image deployment/intent-classifier intent-classifier=$(imageFullName) -n intent-namespace
            kubectl rollout status deployment/intent-classifier -n intent-namespace
          displayName: "Deploy Updated Image to AKS"
