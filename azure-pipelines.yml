trigger:
  branches:
    include:
      - main

variables:
  imageName: 'mlops-kubernetes'
  tag: '$(Build.BuildId)'
  acrName: 'yourACRName'
  aksCluster: 'yourAKSClusterName'
  aksRG: 'yourResourceGroup'
  dockerfilePath: 'model/Dockerfile'
  imageFullName: '$(acrName).azurecr.io/$(imageName):$(tag)'

stages:

# ---------------------------------------------------------
# 2. BUILD → IMAGE SCAN → PUSH TO ACR
# ---------------------------------------------------------
- stage: Build_and_Push
  displayName: "Build, Scan & Push Docker Image"
  dependsOn: Code_Scan
  jobs:
    - job: Build
      displayName: "Build Docker Image"
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self

        # Login to ACR
        - task: AzureCLI@2
          inputs:
            azureSubscription: 'AzureServiceConnection'
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az acr login --name $(acrName)

        # Build Docker Image
        - script: |
            docker build -t $(imageFullName) -f $(dockerfilePath) .
          displayName: "Build Docker Image"

        # Image Scan (Trivy)
        - script: |
            echo "Scanning image with Trivy..."
            trivy image --exit-code 1 --severity HIGH,CRITICAL $(imageFullName)
          displayName: "Scan Docker Image with Trivy"

        # Push Image to ACR
        - script: |
            docker push $(imageFullName)
          displayName: "Push Image to ACR"

# ---------------------------------------------------------
# 3. DEPLOY TO AKS
# ---------------------------------------------------------
- stage: Deploy
  displayName: "Deploy to AKS"
  dependsOn: Build_and_Push
  jobs:
    - job: DeployJob
      displayName: "Deploy to AKS"
      pool:
        vmImage: 'ubuntu-latest'
      steps:

        # Login to AKS
        - task: AzureCLI@2
          inputs:
            azureSubscription: 'AzureServiceConnection'
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az aks get-credentials --resource-group $(aksRG) --name $(aksCluster)

        # Deploy using Kubernetes manifest
        - script: |
            echo "Deploying to AKS..."
            kubectl set image deployment/mlops-app mlops-container=$(imageFullName)
            kubectl rollout status deployment/mlops-app
          displayName: "Deploy Updated Image to AKS"
